name: Astronomer Deploy DAGs

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Astro CLI
        run: curl -sSL https://install.astronomer.io | sudo bash -s

      - name: Create Astro project config
        run: |
          mkdir -p .astro
          cat > .astro/config.yaml << 'EOF'
          context: ""
          project:
            name: nyc-taxi-pipeline
          EOF

      - name: Deploy DAGs to Astronomer
        env:
          ASTRONOMER_API_TOKEN: ${{ secrets.ASTRO_TOKEN }}
        run: |
          astro deploy cmrfaz23f4la501nvg87gfssw --dags --force
