name: Astronomer Deploy DAGs

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Astro CLI
        run: curl -sSL https://install.astronomer.io | sudo bash -s

      - name: Deploy DAGs to Astronomer
        env:
          ASTRONOMER_API_TOKEN: ${{ secrets.ASTRO_API_TOKEN }}
        run: |
          # Write context config — workspace only, no token (token via env var)
          python3 -c "
import pathlib
config = '''context: cloud.astronomer.io
contexts:
  cloud.astronomer.io:
    domain: cloud.astronomer.io
    workspace: cmrf9nhxu4itb01naaus61yoc
    last_used_workspace: cmrf9nhxu4itb01naaus61yoc
'''
p = pathlib.Path.home() / '.astro'
p.mkdir(exist_ok=True)
(p / 'config.yaml').write_text(config)
print('Context written')
"
          mkdir -p .astro
          echo "context: cloud.astronomer.io" > .astro/config.yaml
          astro deploy cmrfaz23f4la501nvg87gfssw --dags --force --workspace-id cmrf9nhxu4itb01naaus61yoc
