name: Astronomer Deploy DAGs

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Deploy DAGs to Astronomer
        uses: astronomer/deploy-action@v0.4
        with:
          deployment-id: cmrfaz23f4la501nvg87gfssw
          dag-deploy-enabled: true
        env:
          ASTRONOMER_API_TOKEN: ${{ secrets.ASTRO_TOKEN }}
