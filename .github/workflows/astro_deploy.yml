name: Astronomer Deploy DAGs

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Astro CLI
        run: curl -sSL https://install.astronomer.io | sudo bash -s

      - name: Deploy DAGs to Astronomer
        env:
          ASTRONOMER_API_TOKEN: ${{ secrets.ASTRO_API_TOKEN }}
        run: |
          # Write Astro CLI auth config
          python3 -c "
          import os, pathlib
          token = os.environ['ASTRONOMER_API_TOKEN']
          workspace = 'cmrf9nhxu4itb01naaus61yoc'
          lines = [
            'context: cloud.astronomer.io',
            'contexts:',
            '  cloud.astronomer.io:',
            '    domain: cloud.astronomer.io',
            '    token: ' + token,
            '    workspace: ' + workspace,
            '    last_used_workspace: ' + workspace,
          ]
          p = pathlib.Path.home() / '.astro'
          p.mkdir(exist_ok=True)
          (p / 'config.yaml').write_text('\n'.join(lines) + '\n')
          print('Auth config written')
          "
          # Create Astro project marker
          mkdir -p .astro
          echo "context: cloud.astronomer.io" > .astro/config.yaml
          # Deploy
          astro deploy cmrfaz23f4la501nvg87gfssw --dags --force --workspace-id cmrf9nhxu4itb01naaus61yoc
