name: Astronomer Deploy DAGs

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Astro CLI
        run: curl -sSL https://install.astronomer.io | sudo bash -s

      - name: Write Astro CLI config with token
        env:
          ASTRO_TOKEN: ${{ secrets.ASTRO_TOKEN }}
        run: |
          python3 - <<'PYEOF'
          import os, pathlib
          token = os.environ['ASTRO_TOKEN']
          workspace = 'cmrf9nhxu4itb01naaus61yoc'
          config = (
              "context: cloud.astronomer.io\n"
              "contexts:\n"
              "  cloud.astronomer.io:\n"
              "    domain: cloud.astronomer.io\n"
              f"    token: {token}\n"
              f"    workspace: {workspace}\n"
              f"    last_used_workspace: {workspace}\n"
          )
          astro_dir = pathlib.Path.home() / '.astro'
          astro_dir.mkdir(exist_ok=True)
          (astro_dir / 'config.yaml').write_text(config)
          print('Astro config written successfully')
          PYEOF

      - name: Create Astro project marker
        run: |
          mkdir -p .astro
          echo "context: cloud.astronomer.io" > .astro/config.yaml

      - name: Deploy DAGs to Astronomer
        run: astro deploy cmrfaz23f4la501nvg87gfssw --dags --force
