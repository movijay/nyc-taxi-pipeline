version: 2

models:
  - name: int_trips_enriched
    description: >
      Trips joined with zone names, invalid records removed.
      This model is ephemeral — it materialises inline into downstream mart queries.
    columns:
      - name: trip_id
        tests:
          - not_null
          - unique:
              severity: warn
      - name: pickup_datetime
        tests: [not_null]
      - name: fare_amount
        tests: [not_null]
      - name: total_amount
        tests: [not_null]
